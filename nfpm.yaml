name: "cyberpower-ups"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "utils"
priority: "optional"
maintainer: "Paul Maseberg <paulm@grooverlabs.org>"
description: |
  CyberPower UPS Monitoring Tool and Service.
  Lightweight standalone monitoring for CyberPower UPS devices via USB HID
  with real-time status, Prometheus metrics export, and systemd integration.
vendor: "Groover Labs"
license: "MIT"
homepage: "https://github.com/grooverlabs/cyberpower"

# Soft dependency: udev makes USB device access easier, but CLI works without
recommends:
  - udev

# Hard dependency: systemd for service management
depends:
  - systemd

contents:
  # CLI binary
  - src: ./bin/ups-cli-pkg
    dst: /usr/bin/ups-cli
    file_info:
      mode: 0755

  # Monitor service binary
  - src: ./bin/ups-monitor-pkg
    dst: /usr/bin/ups-monitor
    file_info:
      mode: 0755

  # Systemd service unit
  - src: ./packaging/cyberpower-ups-monitor.service
    dst: /lib/systemd/system/cyberpower-ups-monitor.service
    file_info:
      mode: 0644

  # Udev rules for USB device access
  - src: ./packaging/99-cyberpower.rules
    dst: /etc/udev/rules.d/99-cyberpower.rules
    file_info:
      mode: 0644

  # Example configuration (actual config created on first install by postinstall.sh)
  - src: ./packaging/config.env.example
    dst: /etc/ups-monitor/config.env.example
    file_info:
      mode: 0644
      owner: "root"
      group: "root"

scripts:
  postinstall: ./packaging/postinstall.sh
  preremove: ./packaging/preremove.sh
