name: "cyberpower-ups"
arch: "amd64"
platform: "linux"
version: "0.0.1"
section: "utils"
priority: "optional"
maintainer: "Paul Maseberg <paulm@grooverlabs.org>"
description: |
  CyberPower UPS Monitoring Tool and Service.
  Provides a CLI tool and a background service for monitoring CyberPower UPS devices via USB HID.
vendor: "Groover Labs"
homepage: "https://github.com/pmaseberg/cyberpower"
license: "MIT"

contents:
  - src: ./ups-cli
    dst: /usr/bin/ups-cli
  - src: ./ups-monitor
    dst: /usr/bin/ups-monitor
  - src: ./packaging/cyberpower-ups-monitor.service
    dst: /etc/systemd/system/cyberpower-ups-monitor.service
  - src: ./packaging/99-cyberpower.rules
    dst: /etc/udev/rules.d/99-cyberpower.rules

scripts:
  preinstall: ./packaging/scripts/preinstall.sh
  postinstall: ./packaging/scripts/postinstall.sh
  preremove: ./packaging/scripts/preremove.sh
  postremove: ./packaging/scripts/postremove.sh

overrides:
  deb:
    scripts:
      preinstall: ./packaging/scripts/preinstall.sh
      postinstall: ./packaging/scripts/postinstall.sh
      preremove: ./packaging/scripts/preremove.sh
      postremove: ./packaging/scripts/postremove.sh
